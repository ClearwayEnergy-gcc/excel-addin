name: Verify commands.js in sync

# commands.js must be identical between the add-in (root) and the skill
# package (skill-package/). This action fails if they diverge, so a change
# to one without the other is caught before it can be merged.
#
# Edit workflow:
#   1. Edit commands.js at the repo root (canonical source)
#   2. Copy it to skill-package/commands.js
#   3. Commit both files together
#   4. This check confirms they match

on: [push, pull_request]

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: commands.js must be identical in both packages
        run: |
          if ! diff commands.js skill-package/commands.js > /dev/null 2>&1; then
            echo "ERROR: commands.js is out of sync."
            echo "The add-in (commands.js) and skill package (skill-package/commands.js) must be identical."
            echo ""
            echo "Diff:"
            diff commands.js skill-package/commands.js || true
            exit 1
          fi
          echo "OK: commands.js files are identical."
