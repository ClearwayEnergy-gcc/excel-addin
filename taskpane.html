<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clearway Project Financial Model Add-in</title>
  <link rel="stylesheet" href="taskpane.css" />
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
</head>
<body>
  <div id="app">

    <!-- ── Commands ─────────────────────────────────────────────────────────── -->
    <div class="section-title">Commands</div>
    <section id="cmd-section">
      <div id="cmd-buttons">
        <button id="checkModelBtn" class="cmd-btn"
                title="Checks whether this workbook is a Clearway Project Financial Model.">
          Check for Clearway Project Financial Model
        </button>
        <button id="solveTEUpfrontBtn" class="cmd-btn"
                title="Sets CEG_FinancingScenario, pastes baselines, then iterates CEG_TEUpfront_HC ← CEG_TEUpfront_Live until CEG_TEUpfront_Diff = 0.">
          Solve TEI Upfront Investment
        </button>
        <button id="flipDateBtn" class="cmd-btn"
                title="Solves for the tax equity flip date by iterating CEG_FlipDate via CEG_FlipGuess until CEG_FlipIRR_Live crosses the target.">
          Find TE Partnership Flip Date
        </button>
      </div>
    </section>

    <!-- ── Activity Log ─────────────────────────────────────────────────────── -->
    <section id="log-section">
      <div id="log-header">
        <span class="section-title">Activity Log</span>
        <button id="clearLogBtn" title="Clear all log entries">Clear Log</button>
      </div>
      <div id="log-container">
        <ul id="log-list"></ul>
      </div>
    </section>

  </div>
  <script type="module" src="taskpane.js"></script>
</body>
</html>
