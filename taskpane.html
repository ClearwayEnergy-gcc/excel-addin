<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Excel Macro Add-in</title>
  <link rel="stylesheet" href="taskpane.css" />
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
</head>
<body>
  <div id="app">

    <header>
      <h1>Excel Macro Add-in</h1>
    </header>

    <!-- ── Commands ─────────────────────────────────────────────────────────── -->
    <section id="cmd-section">
      <div class="section-title">Commands</div>
      <div id="cmd-buttons">
        <button id="checkModelBtn" class="cmd-btn"
                title="Checks whether this workbook is a Clearway Project Financial Model.">
          Check for Clearway Project Financial Model
        </button>
      </div>
    </section>

    <!-- ── Activity Log ─────────────────────────────────────────────────────── -->
    <section id="log-section">
      <div id="log-header">
        <span class="section-title">Activity Log</span>
        <button id="clearLogBtn" title="Clear all log entries">Clear Log</button>
      </div>
      <div id="log-container">
        <ul id="log-list"></ul>
      </div>
    </section>

  </div>
  <script src="taskpane.js"></script>
</body>
</html>
